

spring.application.name=StudentApplication

# Render provides the PORT variable automatically.
# This says: Use the PORT variable, or default to 8080 if not found.
server.port=${PORT:8080}

# JPA & Hibernate
# Use 'update' so Hibernate creates your tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Database Configuration
# These ${VARIABLES} will be filled by Render's Environment settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${jdbc:mysql://localhost:3306/intdb?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${root}
spring.datasource.password=${root}

# Connection Pool Settings (Recommended for cloud hosting)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000